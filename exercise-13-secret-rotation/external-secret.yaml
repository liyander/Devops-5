apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payment-external-secret
  namespace: production
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: payment-secret
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: production/payment-service/api-token
        version: AWSCURRENT
    - secretKey: db-password
      remoteRef:
        key: production/payment-service/db-password
        version: AWSCURRENT
