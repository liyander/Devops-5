AWSTemplateFormatVersion: '2010-09-09'
Description: Security Group for EKS nodes - Broken (missing DynamoDB egress)

Resources:
  NodeSecurityGroupBroken:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EKS Node Security Group - Restrictive
      VpcId: vpc-0abc123def456
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.0.0.0/16
        - IpProtocol: tcp
          FromPort: 10250
          ToPort: 10250
          CidrIp: 10.0.0.0/16
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.0.0.0/16
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 10.0.0.0/16
