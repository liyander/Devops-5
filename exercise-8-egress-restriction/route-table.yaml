AWSTemplateFormatVersion: '2010-09-09'
Description: Route Table - Missing route to NAT Gateway for private subnets

Resources:
  PrivateRouteTableBroken:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: vpc-0abc123def456

  PrivateSubnetRouteTableAssoc1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: subnet-0a1b2c3d4e5f6a7b8
      RouteTableId: !Ref PrivateRouteTableBroken

  PrivateSubnetRouteTableAssoc2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: subnet-8b7a6f5e4d3c2b1a0
      RouteTableId: !Ref PrivateRouteTableBroken
