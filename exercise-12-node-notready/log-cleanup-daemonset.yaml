apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-cleanup
  namespace: kube-system
  labels:
    app: log-cleanup
spec:
  selector:
    matchLabels:
      app: log-cleanup
  template:
    metadata:
      labels:
        app: log-cleanup
    spec:
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: log-cleanup
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                find /var/log/containers/ -name '*.log' -size +100M -exec truncate -s 0 {} \;
                find /var/log/containers/ -name '*.log' -mtime +3 -delete
                find /var/log/pods/ -name '*.log' -mtime +3 -delete
                sleep 3600
              done
          securityContext:
            privileged: true
          volumeMounts:
            - name: varlogcontainers
              mountPath: /var/log/containers
            - name: varlogpods
              mountPath: /var/log/pods
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
        - name: varlogpods
          hostPath:
            path: /var/log/pods
